name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Decode the base64-encoded upload keystore stored in the
      # RELEASE_KEYSTORE_BASE64 repository secret. If it is not set, the
      # release build falls back to an unsigned artifact.
      - name: Decode signing keystore
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --stacktrace

      - name: Build release APK and AAB
        env:
          BADGEBOT_KEYSTORE_FILE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' && format('{0}/upload-keystore.jks', runner.temp) || '' }}
          BADGEBOT_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          BADGEBOT_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          BADGEBOT_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/*.apk artifacts/ 2>/dev/null || true
          cp app/build/outputs/bundle/release/*.aab artifacts/ 2>/dev/null || true
          ls -la artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: badgebot-release
          path: artifacts/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
